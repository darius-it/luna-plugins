name: "Validate & Build"

on:
  workflow_dispatch:

jobs:
  Sanity:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm 📥
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install Node.js 📥
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: latest

      - name: Install dependencies 📥
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: luna-artifacts
          path: ./dist
